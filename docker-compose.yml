services:
  db:
    image: mysql:8.0
    container_name: g08_app
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: g08pass2026
      MYSQL_DATABASE: car_booking
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-P", "3306"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: g08_app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "4000:4000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: g08pass2026
      DB_NAME: car_booking
      PORT: 4000

volumes:
  mysql_data:
