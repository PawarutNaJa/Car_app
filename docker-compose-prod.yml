services:
  db:
    image: mysql:8.0
    container_name: g08_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: g08pass2026
      MYSQL_DATABASE: car_booking
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - appnetwork
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-P", "3306"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    image: wave07/car_app:backend
    container_name: g08_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: g08pass2026
      DB_NAME: car_booking
      PORT: 3000
    networks:
      - course_proxy
      - appnetwork

volumes:
  mysql_data:

networks:
  course_proxy:
    external: true
  appnetwork:
    driver: bridge